<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exercise 38 - Color Sections</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header" id="top">
    <nav class="nav container" aria-label="Primary">
      <a class="logo" href="#home">MySite</a>

      <button class="nav__toggle" id="navToggle" aria-label="Open menu" aria-expanded="false">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>

      <div class="nav__menu" id="navMenu">
        <ul class="nav__list" id="navList">
          <li><a class="nav__link" href="#home">Home</a></li>
          <li><a class="nav__link" href="#about">About</a></li>
          <li><a class="nav__link" href="#services">Service</a></li>
          <li><a class="nav__link" href="#portfolio">Portfolio</a></li>
          <li><a class="nav__link" href="#blog">Blog</a></li>
          <li><a class="nav__link" href="#careers">Careers</a></li>
          <li><a class="nav__link" href="#contact">Contact</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main>
    <section id="home" class="section">
      <div class="container section__center">
        <h1>Home</h1>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container section__center">
        <h1>About</h1>
      </div>
    </section>

    <section id="services" class="section">
      <div class="container section__center">
        <h1>Service</h1>
      </div>
    </section>

    <section id="portfolio" class="section">
      <div class="container section__center">
        <h1>Portfolio</h1>
      </div>
    </section>

    <section id="blog" class="section">
      <div class="container section__center">
        <h1>Blog</h1>
      </div>
    </section>

    <section id="careers" class="section">
      <div class="container section__center">
        <h1>Careers</h1>
      </div>
    </section>

    <section id="contact" class="section">
      <div class="container section__center">
        <h1>Contact</h1>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
