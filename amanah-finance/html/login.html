<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amanah Finance | Login</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="login" class="auth-page">
  <main class="auth-shell">
    <section class="card auth-card">
      <h1>Amanah Finance</h1>
      <p class="muted">Sign in to continue.</p>
      <form id="loginForm" class="form-grid auth-form">
        <label>Username<input id="username" required /></label>
        <label>Password<input id="password" type="password" required /></label>
        <div class="form-actions">
          <button type="submit">Login</button>
        </div>
      </form>
      <p class="muted">Demo: <strong>admin</strong> / <strong>admin123</strong></p>
    </section>
  </main>

    <footer class="site-footer">
    <div class="footer-inner">
      <p>Amanah Finance - Shariah-Compliant Microfinance Management System</p>
      <div class="social-links" aria-label="Social media links">
        <a href="#" aria-label="Facebook" title="Facebook" class="social-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M13.5 8H16V5h-2.5C10.9 5 9 6.9 9 9.5V12H7v3h2v6h3v-6h2.5l.5-3H12V9.5c0-.9.6-1.5 1.5-1.5z"/></svg>
        </a>
        <a href="#" aria-label="Instagram" title="Instagram" class="social-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5zm0 2a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3H7zm11 1.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"/></svg>
        </a>
        <a href="#" aria-label="Twitter" title="Twitter" class="social-link">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 5.8c-.7.3-1.5.5-2.2.6.8-.5 1.3-1.2 1.6-2.1-.8.5-1.7.8-2.6 1A3.7 3.7 0 0 0 12.5 8c0 .3 0 .6.1.9-3-.1-5.6-1.6-7.4-3.8-.3.5-.5 1.1-.5 1.8 0 1.3.7 2.4 1.7 3-.6 0-1.2-.2-1.7-.5v.1c0 1.8 1.2 3.2 2.9 3.6-.3.1-.7.1-1 .1-.2 0-.5 0-.7-.1.5 1.5 1.9 2.6 3.6 2.7A7.5 7.5 0 0 1 4 18.3 10.6 10.6 0 0 0 9.8 20c6.9 0 10.7-5.9 10.7-11v-.5c.7-.5 1.3-1.1 1.8-1.7-.7.3-1.4.5-2.1.6.8-.5 1.4-1.1 1.8-1.8z"/></svg>
        </a>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script type="module" src="../js/app.js"></script>
  <script type="module" src="../js/auth.js"></script>
</body>
</html>
